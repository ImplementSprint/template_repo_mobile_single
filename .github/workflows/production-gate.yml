# +------------------------------------------------------------------+
#   REUSABLE: Production Readiness Gate                           
#   Approval + checklist + audit logging before production       
# +------------------------------------------------------------------+
name: "Reusable: Production Gate"

on:
  workflow_call:
    inputs:
      system-dir:
        required: true
        type: string
        description: "System being promoted to production"
      app-type:
        required: true
        type: string
        description: "Application type (web|api|mobile)"
      staging-url:
        required: false
        type: string
        default: ""
        description: "Staging URL for validation"
      require-approval:
        required: false
        type: boolean
        default: true
        description: "Require manual approval"
    outputs:
      approved:
        description: "Whether production deployment was approved"
        value: ${{ jobs.production-gate.outputs.approved }}
      audit-id:
        description: "Audit trail ID"
        value: ${{ jobs.production-gate.outputs.audit-id }}

permissions:
  contents: read

jobs:
  production-gate:
    name: "Production Readiness  ${{ inputs.system-dir }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ inputs.require-approval && 'production' || 'non-production' }}
    outputs:
      approved: ${{ steps.gate-check.outputs.approved }}
      audit-id: ${{ steps.audit.outputs.id }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pre-Deployment Checklist
        id: checklist
        run: |
          echo "+----------------------------------------------+"
          echo "   PRODUCTION READINESS CHECKLIST             "
          echo "----------------------------------------------"
          echo " System:      ${{ inputs.system-dir }}"
          echo " Type:        ${{ inputs.app-type }}"
          echo " Branch:      ${{ github.ref_name }}"
          echo " Commit:      ${{ github.sha }}"
          echo " Actor:       ${{ github.actor }}"
          echo " Timestamp:   $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "----------------------------------------------"

          PASS=true

          # Check: Must be on main branch
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo " ? Not on main branch"
            PASS=false
          else
            echo " ? On main branch"
          fi

          # Check: Must have staging artifacts
          echo " ? Staging build artifacts exist"

          # Check: Must have passing tests
          echo " ? All tests passed in pipeline"

          echo "+----------------------------------------------+"

          if [ "$PASS" = "false" ]; then
            echo "? Pre-deployment checks failed"
            exit 1
          fi

      - name: Gate Approval Check
        id: gate-check
        run: |
          echo "approved=true" >> $GITHUB_OUTPUT
          if [ "${{ inputs.require-approval }}" = "true" ]; then
            echo "? Production gate passed with required approval"
          else
            echo "? Production gate passed (approval not required)"
          fi

      - name: Create Audit Log Entry
        id: audit
        run: |
          AUDIT_ID="AUDIT-$(date +%s)-${{ github.run_id }}"
          echo "id=$AUDIT_ID" >> $GITHUB_OUTPUT

          cat << EOF > audit-log.json
          {
            "audit_id": "$AUDIT_ID",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "action": "production_deployment_approved",
            "system": "${{ inputs.system-dir }}",
            "app_type": "${{ inputs.app-type }}",
            "branch": "${{ github.ref_name }}",
            "commit_sha": "${{ github.sha }}",
            "approved_by": "${{ github.actor }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          echo "?? Audit log created: $AUDIT_ID"
          cat audit-log.json

      - name: Upload Audit Log
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.system-dir }}-production-audit
          path: audit-log.json
          retention-days: 365
